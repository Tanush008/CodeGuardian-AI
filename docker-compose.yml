version: "3.9"

services:
  codeguardian:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./secrets:/app/secrets:ro
      - chroma_data:/app/data/chroma
    command: ["uvicorn", "app.core.webhook:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped

volumes:
  chroma_data:
